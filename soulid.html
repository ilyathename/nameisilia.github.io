<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOU-L1D — nameisilia.</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #fff;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      inset: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── UI overlay ── */
    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* top bar */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 28px 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: all;
    }

    .back-link {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .back-link:hover { color: #fff; }

    .project-label {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 1s;
    }

    .hint.hidden { opacity: 0; }

    .track-info {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: right;
    }

    /* ── start screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      transition: opacity 0.8s;
    }

    #start-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .start-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .start-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .start-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #fff;
      margin: 0 auto 32px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* loading */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #loading.hidden { display: none; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">Loading</div>

<!-- Start screen -->
<div id="start-screen" class="hidden">
  <div class="start-dot"></div>
  <div class="start-title">SOU-L1D</div>
  <div class="start-sub">Click to enter</div>
</div>

<!-- Three.js canvas -->
<div id="canvas-container"></div>

<!-- UI -->
<div class="ui">
  <div class="top-bar">
    <a href="works.html" class="back-link">← Works</a>
    <span style="display:flex;align-items:center;gap:14px;">
      <span class="project-label">SOU-L1D — nameisilia.</span>
      <a href="https://youtu.be/JZsoax0vEkg" target="_blank"
         style="display:flex;align-items:center;opacity:0.4;transition:opacity 0.2s;text-decoration:none;"
         onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0.4"
         title="Watch on YouTube">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="white"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="black"/>
        </svg>
      </a>
    </span>
  </div>
  <div class="bottom-bar" style="padding-bottom:48px;">
    <span class="hint" id="hint">Drag to look around</span>
  </div>
</div>

<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  HOW TO ADD YOUR VIDEO AND AUDIO                         ║
  ║                                                          ║
  ║  1. Put your merged video file in this folder.          ║
  ║     Name it exactly:  soulid-video.mp4                  ║
  ║                                                          ║
  ║  2. Put your music track in this folder.                ║
  ║     Name it exactly:  soulid-audio.mp3                  ║
  ║     (also supports .ogg, .wav)                          ║
  ║                                                          ║
  ║  3. Open soulid.html in your browser. Done.             ║
  ╚══════════════════════════════════════════════════════════╝
-->
<video id="vid" loop crossorigin="anonymous"
       style="display:none" playsinline muted>
  <source src="soulid-video.mp4" type="video/mp4">
</video>



<!-- Three.js r128 from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(function() {

  /* ── elements ── */
  const container      = document.getElementById('canvas-container');
  const startEl        = document.getElementById('start-screen');
  const loadingEl      = document.getElementById('loading');
  const hintEl         = document.getElementById('hint');
  const video          = document.getElementById('vid');

  /* ── Three.js setup ── */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1100);
  camera.position.set(0, 0, 0.001);

  /* ── sphere (inside-out) ── */
  const geo = new THREE.SphereGeometry(500, 60, 40);
  geo.scale(-1, 1, 1); // flip normals → see from inside

  const texture  = new THREE.VideoTexture(video);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.format    = THREE.RGBFormat;

  const mat    = new THREE.MeshBasicMaterial({ map: texture });
  const sphere = new THREE.Mesh(geo, mat);
  scene.add(sphere);

  /* ── camera rotation state ── */
  let isDragging = false;
  let prevMouse  = { x: 0, y: 0 };
  let lon = 0, lat = 0; // degrees

  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const toRad = d => d * Math.PI / 180;

  function updateCamera() {
    lat = clamp(lat, -85, 85);
    const phi   = toRad(90 - lat);
    const theta = toRad(lon);
    camera.lookAt(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    );
  }

  /* ── mouse drag ── */
  renderer.domElement.addEventListener('mousedown', e => {
    isDragging = true;
    prevMouse.x = e.clientX;
    prevMouse.y = e.clientY;
    renderer.domElement.style.cursor = 'grabbing';
    // hide hint once user interacts
    hintEl.classList.add('hidden');
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    renderer.domElement.style.cursor = 'grab';
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    lon -= dx * 0.15;
    lat += dy * 0.15;
    prevMouse.x = e.clientX;
    prevMouse.y = e.clientY;
  });

  /* ── touch drag ── */
  renderer.domElement.addEventListener('touchstart', e => {
    isDragging = true;
    prevMouse.x = e.touches[0].clientX;
    prevMouse.y = e.touches[0].clientY;
    hintEl.classList.add('hidden');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', () => { isDragging = false; });

  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    lon -= dx * 0.2;
    lat += dy * 0.2;
    prevMouse.x = e.touches[0].clientX;
    prevMouse.y = e.touches[0].clientY;
  });

  /* ── resize ── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ── render loop ── */
  function animate() {
    requestAnimationFrame(animate);
    if (video.readyState >= video.HAVE_ENOUGH_DATA) {
      texture.needsUpdate = true;
    }
    updateCamera();
    renderer.render(scene, camera);
  }

  /* ── start flow ── */
  renderer.domElement.style.cursor = 'grab';

  video.addEventListener('canplaythrough', () => {
    loadingEl.classList.add('hidden');
    startEl.classList.remove('hidden');
  }, { once: true });

  // if video doesn't load (no file yet), still show start after 1s
  setTimeout(() => {
    loadingEl.classList.add('hidden');
    startEl.classList.remove('hidden');
  }, 1200);

  startEl.addEventListener('click', () => {
    startEl.classList.add('fade-out');
    setTimeout(() => { startEl.style.display = 'none'; }, 900);

    // start video and audio together
    video.muted = false;
    video.play().catch(() => {
      // if autoplay blocked, try muted first
      video.muted = true;
      video.play();
    });

    animate();
  });

  // begin loading (no autoplay yet)
  video.load();
  animate(); // render static scene while loading

})();
</script>
</body>
</html>
