<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nameisilia.</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f4f0;
      --ink: #111111;
      --muted: #999;
      --f: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--f);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
      cursor: default;
      user-select: none;
    }

    .page {
      width: 100vw; height: 100vh;
      padding: 30px 36px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    /* ── header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 28px;
    }

    nav a {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--muted); }

    /* ── floating PNGs ── */
    .float-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .draggable {
      position: absolute;
      pointer-events: all;
      cursor: grab;
      transition: filter 0.2s;
      will-change: transform;
    }

    .draggable:active { cursor: grabbing; }
    .draggable img { display: block; max-width: 100%; height: auto; }

    /* placeholders while user adds their PNGs */
    .placeholder-shape {
      position: absolute;
      border: 1px solid rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── bio ── */
    .bio {
      position: relative;
      z-index: 10;
      max-width: 360px;
    }

    .bio-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }

    .bio-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .bio-links {
      display: flex;
      gap: 24px;
    }

    .bio-links a {
      font-size: 13px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .bio-links a:hover { color: var(--muted); }

    /* ── center index number ── */
    .index-num {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      color: rgba(0,0,0,0.15);
      letter-spacing: 0.1em;
      z-index: 1;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <a href="index.html" class="logo">nameisilia.</a>
    <nav>
      <a href="works.html">Works</a>
      <a href="mailto:KORCHAGIN.CG@GMAIL.COM">Contact</a>
    </nav>
  </header>

  <!-- floating PNG layer — replace the placeholder-shapes with your actual <img> tags -->
  <div class="float-layer" id="floatLayer">

    <!-- PLACEHOLDER 1 — replace with: <img src="your-image-1.png" alt=""> -->
    <div class="draggable placeholder-shape"
         style="width:160px;height:200px;top:18%;left:28%;">
      your png here
    </div>

    <!-- PLACEHOLDER 2 — replace with: <img src="your-image-2.png" alt=""> -->
    <div class="draggable placeholder-shape"
         style="width:120px;height:120px;top:30%;left:58%;">
      your png here
    </div>

    <!-- PLACEHOLDER 3 — replace with: <img src="your-image-3.png" alt=""> -->
    <div class="draggable placeholder-shape"
         style="width:200px;height:140px;top:52%;left:44%;">
      your png here
    </div>

  </div>

  <div class="index-num">© nameisilia.</div>

  <div class="bio">
    <p class="bio-name">nameisilia.</p>
    <p class="bio-text">
      Creative director and visual artist.<br>
      Gen Z Official Member.
    </p>
    <div class="bio-links">
      <a href="https://instagram.com/NAMEISILIA" target="_blank">Instagram ↗</a>
      <a href="mailto:KORCHAGIN.CG@GMAIL.COM">Contact ↗</a>
    </div>
  </div>

</div>

<script>
  // make every .draggable element freely movable
  document.querySelectorAll('.draggable').forEach(el => {
    let isDragging = false, ox = 0, oy = 0, sx = 0, sy = 0;

    const getMatrix = () => {
      const t = new DOMMatrix(getComputedStyle(el).transform);
      return { x: t.m41, y: t.m42 };
    };

    el.addEventListener('mousedown', e => {
      isDragging = true;
      const m = getMatrix();
      ox = e.clientX - m.x;
      oy = e.clientY - m.y;
      el.style.zIndex = 99;
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      el.style.transform = `translate(${e.clientX - ox}px, ${e.clientY - oy}px)`;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      el.style.zIndex = '';
    });

    // touch support
    el.addEventListener('touchstart', e => {
      const t = e.touches[0];
      const m = getMatrix();
      ox = t.clientX - m.x;
      oy = t.clientY - m.y;
      isDragging = true;
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const t = e.touches[0];
      el.style.transform = `translate(${t.clientX - ox}px, ${t.clientY - oy}px)`;
    });

    document.addEventListener('touchend', () => { isDragging = false; });
  });
</script>
</body>
</html>
